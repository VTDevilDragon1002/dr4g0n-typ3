function startGame(){document.getElementById('start').classList.add('hidden');gameState='playing';score=0;level=1;lives=3;kills=0;hits=0;misses=0;mult=1;streak=0;enemies=[];bullets=[];parts=[];current=null;targetRaw='';spawnTimer=0;usedByLevel=new Set();updateHUD();updateLives();showPop('LEVEL 1');last=performance.now();if(anim)cancelAnimationFrame(anim);anim=requestAnimationFrame(loop)}function restart(){document.getElementById('over').classList.add('hidden');document.getElementById('start').classList.remove('hidden');gameState='menu';updateNext()}
function bank(){return selectedLang==='tamil'?TAMIL_WORDS:selectedLang==='english'?ENGLISH_WORDS:TAMIL_WORDS.concat(ENGLISH_WORDS)}function config(){return{spawn:Math.max(.42,1.45-level*.06),speed:24+level*3.5,max:4+Math.floor(level/2)}}
function firstKeySignature(word){let gr=toGraphemes(word),first=gr[0]||'';if(isTamil(first)){let seq=bestTamilSequenceFor(first)||first;return 'ta:'+seq[0]}return 'en:'+first.toLowerCase()}
function liveFirstSignatures(){return new Set(enemies.filter(e=>!e.dead&&e.typed===0).map(e=>firstKeySignature(e.word)))}
function pickWord(){let blocked=liveFirstSignatures();let b=bank().filter(w=>!usedByLevel.has(w)&&!blocked.has(firstKeySignature(w)));if(!b.length){b=bank().filter(w=>!blocked.has(firstKeySignature(w)))}if(!b.length)return null;let w=b[Math.floor(Math.random()*b.length)];usedByLevel.add(w);return w}
function spawnEnemy(){const word=pickWord();if(!word)return;const gr=toGraphemes(word);enemies.push({word,gr,typed:0,x:70+Math.random()*Math.max(100,canvas.width-140),y:-40,speed:config().speed*(.72+Math.random()*.55),isTamil:isTamil(word[0]),dead:false,alpha:1,flash:0,targeted:false,size:1})}
function updateHUD(){document.getElementById('hscore').textContent=score;document.getElementById('hlevel').textContent=level;document.getElementById('hmult').textContent=mult;const acc=hits+misses?Math.round(hits/(hits+misses)*100):100;document.getElementById('hacc').textContent=acc+'%'}function updateLives(){let el=document.getElementById('lives');el.innerHTML='';for(let i=0;i<3;i++){let s=document.createElement('span');s.className='life'+(i>=lives?' dead':'');s.textContent='♥';el.appendChild(s)}}function showPop(t){let p=document.getElementById('pop');p.textContent=t;p.style.opacity=1;setTimeout(()=>p.style.opacity=0,1000)}
addEventListener('keypress',e=>{if(gameState!=='playing'||e.ctrlKey||e.altKey||e.metaKey)return;let ch=String.fromCharCode(e.charCode);if(!ch||e.charCode<32)return;e.preventDefault();handle(ch)});addEventListener('keydown',e=>{if(gameState!=='playing')return;if(e.key==='Backspace'){e.preventDefault();cancelTarget()}});
function handle(ch){if(!current)findTarget(ch);else advance(ch);updateNext()}
function findTarget(ch){let best=null,by=-Infinity;for(const e of enemies){if(e.dead||e.typed>=e.gr.length)continue;let expected=e.gr[e.typed],ok=false;if(e.isTamil){let seq=tamilSequencesFor(expected);ok=seq.some(s=>s.startsWith(ch))}else ok=expected.toLowerCase()===ch.toLowerCase();if(ok&&e.y>by){by=e.y;best=e}}if(best){current=best;best.targeted=true;targetRaw='';advance(ch)}else miss()}
function advance(ch){let e=current;if(!e)return;if(!e.isTamil){let ex=e.gr[e.typed];if(ch.toLowerCase()===ex.toLowerCase())hit(e);else miss();return}targetRaw+=ch;let expected=e.gr[e.typed],seq=tamilSequencesFor(expected);if(seq.includes(targetRaw)){hit(e);targetRaw='';return}if(expected==='று'&&targetRaw==='w'&&e.gr[e.typed-1]==='ற்'){hit(e);targetRaw='';return}if(seq.some(s=>s.startsWith(targetRaw)))return;miss();targetRaw=''}
function hit(e){e.typed++;e.flash=1;hits++;streak++;fire(e.x,e.y);playShoot();if(e.typed>=e.gr.length)kill(e)}function kill(e){e.dead=true;kills++;score+=e.gr.length*mult*10;if(streak>=30)mult=4;else if(streak>=15)mult=3;else if(streak>=7)mult=2;explode(e.x,e.y,30,'#c9a84c');explode(e.x,e.y,16,'#ff6600');current=null;targetRaw='';if(kills>0&&kills%10===0){level++;usedByLevel.clear();showPop('LEVEL '+level)}updateHUD();updateNext()}
function miss(){misses++;streak=0;mult=1;shake=6;updateHUD()}function cancelTarget(){if(current){current.targeted=false;current.typed=0}current=null;targetRaw='';updateNext()}
function fire(tx,ty){bullets.push({x:playerX,y:playerY-25,tx,ty,speed:14,life:1})}function explode(x,y,c,color){for(let i=0;i<c;i++){let a=Math.random()*Math.PI*2,s=.5+Math.random()*3;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.018+Math.random()*.025,r:1+Math.random()*3,color})}}
function loop(ts){if(gameState!=='playing')return;let dt=Math.min((ts-last)/1000,.1);last=ts;update(dt);draw();anim=requestAnimationFrame(loop)}
function update(dt){spawnTimer+=dt;let c=config();if(spawnTimer>=c.spawn&&enemies.filter(e=>!e.dead).length<c.max){spawnEnemy();spawnTimer=0}for(const e of enemies){if(e.dead){e.alpha-=dt*3;e.size+=dt*2;continue}e.y+=e.speed*dt;e.flash=Math.max(0,e.flash-dt*5);if(e.y>canvas.height+35){e.dead=true;lives--;streak=0;mult=1;if(current===e){current=null;targetRaw=''}updateLives();updateHUD();shake=12;explode(e.x,canvas.height-30,20,'#ff3333');if(lives<=0){setTimeout(gameOver,400);return}}}enemies=enemies.filter(e=>e.alpha>-.4);for(const b of bullets){let dx=b.tx-b.x,dy=b.ty-b.y,d=Math.hypot(dx,dy)||1;b.x+=dx/d*b.speed;b.y+=dy/d*b.speed;b.life-=dt*2}bullets=bullets.filter(b=>b.life>0);for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vy+=.03}parts=parts.filter(p=>p.life>0);for(const s of stars){s.y+=s.s;if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width}}shake=Math.max(0,shake-dt*30)}
function gameOver(){gameState='gameover';document.getElementById('oscore').textContent=score;document.getElementById('olevel').textContent=level;document.getElementById('okills').textContent=kills;document.getElementById('oacc').textContent=(hits+misses?Math.round(hits/(hits+misses)*100):0)+'%';document.getElementById('over').classList.remove('hidden');if(anim)cancelAnimationFrame(anim)}
function draw(){ctx.save();if(shake>0)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);ctx.fillStyle=gameLight?'#fff':'#000';ctx.fillRect(0,0,canvas.width,canvas.height);for(const s of stars){ctx.globalAlpha=s.o;ctx.fillStyle='#c9a84c';ctx.fillRect(s.x,s.y,s.r,s.r)}ctx.globalAlpha=1;drawPlayer();for(const e of enemies)drawEnemy(e);for(const b of bullets)drawBullet(b);for(const p of parts)drawPart(p);ctx.restore()}
function drawPlayer(){ctx.save();ctx.translate(playerX,playerY);ctx.strokeStyle='#c9a84c';ctx.shadowColor='#c9a84c';ctx.shadowBlur=18;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-26);ctx.lineTo(-24,22);ctx.lineTo(0,12);ctx.lineTo(24,22);ctx.closePath();ctx.stroke();ctx.restore()}function drawBullet(b){ctx.save();ctx.globalAlpha=b.life;ctx.strokeStyle='#00ffcc';ctx.shadowColor='#00ffcc';ctx.shadowBlur=12;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.tx,b.ty);ctx.stroke();ctx.restore()}function drawPart(p){ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore()}
let gameFontSize=22, gameFont='Space Mono', gameLight=false;function applyGameFont(){gameFont=document.getElementById('fontSel')?.value||gameFont}function gameSize(d){gameFontSize=Math.max(14,Math.min(42,gameFontSize+d));document.getElementById('gsize').textContent=gameFontSize}function toggleGameTheme(){gameLight=!gameLight;document.getElementById('gtheme').textContent=gameLight?'DARK':'LIGHT'}
function drawEnemy(e){ctx.save();ctx.globalAlpha=Math.max(0,e.alpha);ctx.translate(e.x,e.y);ctx.scale(e.size,e.size);let col=e.targeted?'#00ffcc':'#c9a84c';if(e.flash>0)col='#fff';ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=e.targeted?18:8;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-12,-5);ctx.lineTo(0,-18);ctx.lineTo(12,-5);ctx.stroke();ctx.font=(e.isTamil?gameFontSize+'px '+gameFont:Math.max(14,gameFontSize-4)+'px '+gameFont);ctx.textBaseline='middle';ctx.textAlign='left';let typed=e.gr.slice(0,e.typed).join(''),next=e.gr[e.typed]||'',rest=e.gr.slice(e.typed+1).join('');let y=e.isTamil?42:38,total=ctx.measureText(typed+next+rest).width,x=-total/2;ctx.fillStyle='#00ffcc';ctx.fillText(typed,x,y);x+=ctx.measureText(typed).width;ctx.fillStyle='#ffe27a';ctx.shadowColor='#ffe27a';ctx.shadowBlur=14;ctx.fillText(next,x,y);x+=ctx.measureText(next).width;ctx.shadowBlur=0;ctx.fillStyle='#bbb';ctx.fillText(rest,x,y);ctx.textAlign='center';if(e.targeted){ctx.font='12px Space Mono';ctx.fillStyle='#c9a84c';ctx.fillText('NEXT '+buildNextKeyHTMLText(e),0,e.isTamil?66:60);if(targetRaw){ctx.fillStyle='#00ffcc';ctx.fillText('TYPED '+targetRaw,0,e.isTamil?82:76)}}ctx.restore()}
function buildNextKeyHTMLText(e){let n=e.gr[e.typed]||'';if(!n)return 'DONE';return e.isTamil?keyDisplay(bestTamilSequenceFor(n)||'?'):n}function updateNext(){let el=document.getElementById('nextKey');if(gameState!=='playing'){el.textContent='Choose mode and start';return}if(!current){el.innerHTML='<span class="wait">Type the first letter of any falling word</span>';return}let n=current.gr[current.typed]||'';if(!n){el.textContent='DONE';return}let seq=current.isTamil?(bestTamilSequenceFor(n)||''):n;let raw=current.isTamil?targetRaw:'';let html='';for(let i=0;i<seq.length;i++){let cls=i<raw.length?'done':i===raw.length?'now':'wait';html+='<span class="'+cls+'">'+escapeHTML(seq[i])+'</span> '}el.innerHTML=html||escapeHTML(n)}
updateLives();updateNext();
</script></body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DR4G0N-TYP3 · NOTEPAD</title><link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;700;900&family=Noto+Serif+Tamil:wght@400;600&family=Noto+Sans+Tamil:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet"><style>:root{--bg:#050505;--panel:#101010;--border:#252525;--gold:#c9a84c;--text:#eee;--muted:#777}body.light{--bg:#fff;--panel:#f4f4f4;--border:#d4d4d4;--text:#111;--muted:#555}*{box-sizing:border-box;margin:0;padding:0}body{height:100vh;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;display:flex;flex-direction:column;overflow:hidden}header{min-height:58px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem;padding:.6rem 1rem;flex-wrap:wrap}.logo{font-family:'Rajdhani',sans-serif;font-weight:900;color:var(--gold);letter-spacing:.2em}.right{margin-left:auto;display:flex;gap:.5rem;flex-wrap:wrap}.btn,.sel{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;color:var(--text);background:var(--bg);border:1px solid var(--border);padding:.35rem .65rem;cursor:pointer}.btn:hover{color:var(--gold);border-color:var(--gold)}main{flex:1;display:flex;flex-direction:column;min-height:0}.label{padding:.45rem 1rem;background:var(--panel);border-bottom:1px solid var(--border);font-size:.55rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}.paperWrap{flex:1;min-height:0;display:flex;flex-direction:column}.paper{flex:1;width:100%;overflow:auto;background:var(--bg);color:var(--text);font-family:'Noto Serif Tamil',serif;font-size:24px;line-height:2.05;padding:1.4rem;white-space:pre-wrap;word-break:break-word}.inputWrap{height:116px;background:var(--panel);border-top:1px solid var(--border);display:flex;flex-direction:column}.inputHead{padding:.35rem 1rem;border-bottom:1px solid var(--border);font-size:.52rem;letter-spacing:.18em;color:var(--muted);display:flex;justify-content:space-between}.inputHead b{color:var(--gold);font-weight:700}#raw{flex:1;width:100%;border:0;outline:0;resize:none;background:var(--panel);color:var(--text);caret-color:var(--gold);font-family:'Space Mono',monospace;font-size:18px;line-height:1.55;padding:.65rem 1rem}.empty{color:var(--muted)}@media(max-width:850px){header{align-items:flex-start}.right{margin-left:0}.paper{font-size:22px}.inputWrap{height:128px}}</style></head><body><header><div class="logo">DR4G0N-TYP3 NOTEPAD</div><div class="right"><select id="mode" class="sel" onchange="render()"><option value="tamil">Tamil keys → Tamil</option><option value="english">English normal</option></select><select id="font" class="sel" onchange="applyFont()"><option value="'Noto Serif Tamil',serif">Noto Serif Tamil</option><option value="'Noto Sans Tamil',sans-serif">Noto Sans Tamil</option><option value="'Inter',sans-serif">Inter</option><option value="'Space Mono',monospace">Space Mono</option><option value="serif">System Serif</option><option value="sans-serif">System Sans</option></select><button class="btn" onclick="size(-2)">−</button><button class="btn" onclick="size(2)">+</button><button class="btn" onclick="copyOut()">COPY</button><button class="btn" onclick="clearAll()">CLEAR</button><button id="theme" class="btn" onclick="toggleTheme()">LIGHT</button><button class="btn" onclick="location.href='index.html'">MENU</button></div></header><main><section class="paperWrap"><div class="label">Notepad Output</div><div id="out" class="paper empty">Start typing in the small box below...</div></section><section class="inputWrap"><div class="inputHead"><span>TYPE HERE</span><b id="modeText">TAMIL MODE</b></div><textarea id="raw" placeholder="Tamil mode: type keys like peidth;ww;y  |  English mode: normal typing" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea></section></main><script src="js/engine.js"></script><script>const raw=document.getElementById('raw'),out=document.getElementById('out'),mode=document.getElementById('mode');let fs=24;let savedText='';let lastMode=mode.value;function convertByMode(v,m){return m==='english'?v:transliterate(v).text}function currentText(){return savedText+convertByMode(raw.value,mode.value)}function render(){const m=mode.value;document.getElementById('modeText').textContent=m==='tamil'?'TAMIL MODE':'ENGLISH MODE';const text=currentText();out.textContent=text||'Start typing in the small box below...';out.classList.toggle('empty',!text);out.scrollTop=out.scrollHeight}function commitCurrent(){const part=convertByMode(raw.value,lastMode);if(part){savedText+=part}raw.value=''}function changeModeKeepText(){commitCurrent();lastMode=mode.value;render();raw.focus()}function applyFont(){out.style.fontFamily=document.getElementById('font').value}function size(d){fs=Math.max(14,Math.min(52,fs+d));out.style.fontSize=fs+'px'}function copyOut(){navigator.clipboard&&navigator.clipboard.writeText(out.classList.contains('empty')?'':currentText())}function clearAll(){savedText='';raw.value='';lastMode=mode.value;render();raw.focus()}function toggleTheme(){document.body.classList.toggle('light');document.getElementById('theme').textContent=document.body.classList.contains('light')?'DARK':'LIGHT'}raw.addEventListener('input',render);mode.addEventListener('change',changeModeKeepText);applyFont();render();raw.focus();</script></body></html>

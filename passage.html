let mode='tamil',idx=0,fontSize=22,font="'Noto Serif Tamil',serif",started=false,done=false,sec=0,timer=null,editing=false,checked=false;const inp=document.getElementById('keyInput');function G(s){return toGraphemes(String(s).normalize('NFC'))}function current(){return PASSAGE_BANK[mode][idx]}function nowG(){return G(current())}function setCheckVisible(v){let b=document.getElementById('checkBtn');if(b)b.style.display=v?'inline-block':'none'}function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}function startTimer(){if(started)return;started=true;document.getElementById('nextBtn').disabled=true;timer=setInterval(()=>{sec++;tickStats()},1000)}function stopTimer(){if(timer)clearInterval(timer);timer=null}function resetTimer(){stopTimer();started=false;sec=0;document.getElementById('timer').textContent='0:00'}function inputText(){return typedTextForMode(inp.value,current())}
function typedTextForMode(raw,target){raw=String(raw);if(mode==='english')return raw;if(mode==='tamil')return transliterate(raw).text;const targetG=G(target);let base='',tbuf='';for(const ch of raw){let currentLen=G(base+transliterate(tbuf).text).length;let want=targetG[currentLen];if(isTamil(want)){tbuf+=ch}else{if(tbuf){base+=transliterate(tbuf).text;tbuf=''}base+=ch}}return base+transliterate(tbuf).text}function tickStats(){document.getElementById('timer').textContent=fmt(sec);let tg=G(inputText()),pg=nowG();let corr=0;for(let i=0;i<tg.length;i++)if(tg[i]===pg[i])corr++;let acc=tg.length?Math.round(corr/tg.length*100):100;let wpm=sec>1?Math.round((tg.length/5)/(sec/60)):0;let pr=Math.min(100,Math.round(tg.length/pg.length*100));document.getElementById('acc').textContent=acc+'%';document.getElementById('wpm').textContent=wpm;document.getElementById('prog').textContent=pr+'%';document.getElementById('fill').style.width=pr+'%'}function render(){let tg=G(inputText()),pg=nowG(),html='',out='';for(let i=0;i<pg.length;i++){let p=pg[i],t=tg[i],safe=escapeHTML(p);if(i===tg.length)html+='<span id="curChar" class="cur">'+safe+'</span>';else if(t===undefined)html+='<span class="cp">'+safe+'</span>';else if(t===p)html+='<span class="cc">'+safe+'</span>';else html+='<span class="cp">'+safe+'</span>'}document.getElementById('passage').innerHTML=html;for(let i=0;i<tg.length;i++){out+='<span>'+escapeHTML(tg[i])+'</span>'}document.getElementById('output').innerHTML=out||'<span style="opacity:.35;font-family:Space Mono">START TYPING…</span>';autoScrollTyping();updateNext(tg);tickStats();if(!done&&tg.length>=pg.length){done=true;stopTimer();showResults(tg,pg)}}function autoScrollTyping(){const c=document.getElementById('curChar');if(c)c.scrollIntoView({block:'center',inline:'nearest'});const out=document.getElementById('output');out.scrollTop=out.scrollHeight;}
function updateNext(tg){let pg=nowG(),n=pg[tg.length];let el=document.getElementById('nextKey');if(!n){el.textContent='DONE';return}let seq=isTamil(n)?bestTamilSequenceFor(n):n;if(!seq){el.textContent=n;return}el.innerHTML=seq.split('').map((c,i)=>'<span class="'+(i===0?'now':'wait')+'">'+escapeHTML(c)+'</span>').join(' ')}function showResults(tg,pg){let corr=0;for(let i=0;i<tg.length;i++)if(tg[i]===pg[i])corr++;let acc=tg.length?Math.round(corr/tg.length*100):100,wpm=sec>1?Math.round((tg.length/5)/(sec/60)):0;document.getElementById('rtime').textContent=fmt(sec);document.getElementById('rwpm').textContent=wpm;document.getElementById('racc').textContent=acc+'%';document.getElementById('rchars').textContent=tg.length;setCheckVisible(true);document.getElementById('modal').classList.add('show')}function closeModal(){document.getElementById('modal').classList.remove('show')}inp.addEventListener('input',()=>{if(inp.value.length&&!started)startTimer();render()});function resetAll(){inp.value='';done=false;checked=false;editing=false;setCheckVisible(false);let p=document.getElementById('passage');p.contentEditable='false';p.classList.remove('editing');let eb=document.getElementById('editBtn');if(eb)eb.textContent='EDIT PASSAGE';resetTimer();document.getElementById('nextBtn').disabled=false;closeModal();render()}function nextPassage(){idx=(idx+1)%PASSAGE_BANK[mode].length;document.getElementById('pnum').textContent=(idx+1)+'/5';resetAll()}function changeMode(){mode=document.getElementById('modeSel').value;idx=0;document.getElementById('pnum').textContent='1/5';resetAll()}function toggleTheme(){document.body.classList.toggle('light');document.getElementById('themeBtn').textContent=document.body.classList.contains('light')?'DARK':'LIGHT'}function applyFont(){font=document.getElementById('fontSel').value;applyStyle()}function size(d){fontSize=Math.max(14,Math.min(42,fontSize+d));document.getElementById('sz').textContent=fontSize;applyStyle()}function applyStyle(){document.querySelectorAll('.text').forEach(e=>{e.style.fontFamily=font;e.style.fontSize=fontSize+'px'})}
function manualCheck(){
 let tg=G(inputText()),pg=nowG(),out='';
 for(let i=0;i<pg.length;i++){
   let ch=pg[i]||'';
   if(tg[i]===pg[i]) out+='<span class="cc">'+escapeHTML(ch)+'</span>';
   else out+='<span class="cw">'+escapeHTML(ch)+'</span>';
 }
 document.getElementById('passage').innerHTML=out;
}


function manualCheck(){
 checked=true;
 setCheckVisible(false);
 closeModal();
 render();
}
function togglePassageEdit(){
 let p=document.getElementById('passage'),b=document.getElementById('editBtn');
 if(!editing){
   editing=true;checked=false;setCheckVisible(false);closeModal();stopTimer();
   p.innerText=current();p.contentEditable='true';p.classList.add('editing');
   b.textContent='SAVE PASSAGE';p.focus();

   let txt=p.innerText.trim();
   if(txt.length>0)PASSAGE_BANK[mode][idx]=txt;
   editing=false;p.contentEditable='false';p.classList.remove('editing');b.textContent='EDIT PASSAGE';
   resetAll();
 }
}

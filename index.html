<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DR4G0N-TYP3</title><link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;700;900&family=Noto+Serif+Tamil:wght@400;600&display=swap" rel="stylesheet"><style>
:root{--bg:#000;--gold:#c9a84c;--gold2:#8a6e2f;--text:#eee;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:var(--text);font-family:'Space Mono',monospace;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}#stars{position:fixed;inset:0;z-index:0}body:after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:999}.corner{position:fixed;width:60px;height:60px;z-index:5}.corner-tl{top:1.5rem;left:1.5rem;border-top:1px solid var(--gold2);border-left:1px solid var(--gold2)}.corner-tr{top:1.5rem;right:1.5rem;border-top:1px solid var(--gold2);border-right:1px solid var(--gold2)}.corner-bl{bottom:1.5rem;left:1.5rem;border-bottom:1px solid var(--gold2);border-left:1px solid var(--gold2)}.corner-br{bottom:1.5rem;right:1.5rem;border-bottom:1px solid var(--gold2);border-right:1px solid var(--gold2)}.container{position:relative;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3.2rem}.logo{font-family:'Rajdhani',sans-serif;font-weight:900;font-size:5.4rem;letter-spacing:.15em;color:var(--gold);line-height:1;text-shadow:0 0 20px rgba(201,168,76,.8),0 0 60px rgba(201,168,76,.4),0 0 100px rgba(201,168,76,.2);animation:flick 4s infinite}.logo em{color:#555;font-style:normal}@keyframes flick{0%,90%,100%{opacity:1}92%{opacity:.7}94%{opacity:1}96%{opacity:.5}98%{opacity:1}}.menu{display:flex;gap:1.6rem;flex-wrap:wrap;justify-content:center}.btn{text-decoration:none}.box{width:200px;height:92px;border:2px solid var(--gold2);display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.03);clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));transition:.18s;position:relative;overflow:hidden}.box:before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(201,168,76,.08));opacity:0;transition:.18s}.btn:hover .box{border-color:var(--gold);background:rgba(201,168,76,.08);box-shadow:0 0 24px rgba(201,168,76,.32),inset 0 0 20px rgba(201,168,76,.05);transform:translateY(-3px)}.btn:hover .box:before{opacity:1}.label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.55rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;position:relative;z-index:1}.beam{position:fixed;width:1px;height:100vh;background:linear-gradient(to bottom,transparent,rgba(201,168,76,.12),transparent);z-index:2;animation:beam 8s linear infinite}.beam.b1{left:20%}.beam.b2{left:50%;animation-delay:3s}.beam.b3{left:80%;animation-delay:6s}@keyframes beam{0%{opacity:0;transform:scaleY(0) translateY(-100%)}20%,80%{opacity:1}100%{opacity:0;transform:scaleY(1.5) translateY(50%)}}@media(max-width:650px){.logo{font-size:3rem}.menu{flex-direction:column;gap:1.4rem}.box{width:260px}}
</style></head><body><canvas id="stars"></canvas><div class="beam b1"></div><div class="beam b2"></div><div class="beam b3"></div><div class="corner corner-tl"></div><div class="corner corner-tr"></div><div class="corner corner-bl"></div><div class="corner corner-br"></div><main class="container"><h1 class="logo">DR4G0N<em>—</em>TYP3</h1><nav class="menu"><a class="btn" href="game.html"><div class="box"><span class="label">PLAY</span></div></a><a class="btn" href="passage.html"><div class="box"><span class="label">PASSAGE</span></div></a><a class="btn" href="notepad.html"><div class="box"><span class="label">NOTEPAD</span></div></a></nav></main><script>
const c=document.getElementById('stars'),x=c.getContext('2d');let st=[];function resize(){c.width=innerWidth;c.height=innerHeight;st=Array.from({length:180},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.2,s:Math.random()*.7+.2,o:Math.random()*.6+.15}))}addEventListener('resize',resize);resize();(function loop(){x.clearRect(0,0,c.width,c.height);for(const p of st){p.y+=p.s;if(p.y>c.height){p.y=0;p.x=Math.random()*c.width}x.globalAlpha=p.o;x.fillStyle='#c9a84c';x.fillRect(p.x,p.y,p.r,p.r)}requestAnimationFrame(loop)})();
</script></body></html>
